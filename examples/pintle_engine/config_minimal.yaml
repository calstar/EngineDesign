    density: 780.0
    viscosity: 0.002
    surface_tension: 0.025
    vapor_pressure: 1000.0
    specific_heat: 2000.0
    thermal_conductivity: 0.13
    temperature: 293.0
injector:
  type: pintle
  geometry:
    lox:
      n_orifices: 12  # 12 orifices (realistic for ~7kN engine)
      d_orifice: 0.003  # 3mm orifice diameter (realistic)
      theta_orifice: 30.0  # 30° injection angle (typical)
      A_entry: 8.0e-06  # Entry area
      d_hydraulic: 0.003  # Hydraulic diameter
    fuel:
      d_pintle_tip: 0.015  # 15mm pintle tip (realistic)
      d_reservoir_inner: 0.016  # 16mm reservoir
      h_gap: 0.0005  # 0.5mm gap (realistic)
      A_entry: 1.2e-05  # Entry area
      d_hydraulic: 0.001  # Hydraulic diameter
feed_system:
  oxidizer:
    d_inlet: 0.009525
    A_hydraulic: 7.13e-05
    K0: 2.0
    K1: 0.0
    phi_type: none
  fuel:
    d_inlet: 0.009525
    A_hydraulic: 7.13e-05
    K0: 2.0
    K1: 0.0
    phi_type: none
regen_cooling:
  enabled: false
  d_inlet: 0.009525
  L_inlet: 0.5
  n_channels: 100
  channel_width: 0.0009
  channel_height: 0.001
  channel_length: 0.18162
  d_outlet: null
  L_outlet: 0.1
  roughness: 0.0
  K_manifold_split: 0.5
  K_manifold_merge: 0.3
  Cd_entrance_inf: 0.8
  a_Re_entrance: 0.1
  Cd_entrance_min: 0.6
  Cd_exit_inf: 0.9
  a_Re_exit: 0.1
  Cd_exit_min: 0.7
  use_heat_transfer: true
  wall_thickness: 0.002
  wall_thermal_conductivity: 320.0
  chamber_inner_diameter: 0.08491
  hot_gas_prandtl: 0.7
  hot_gas_viscosity: 4.0e-05
  hot_gas_thermal_conductivity: 0.12
  radiation_emissivity_hot: 0.85
  radiation_view_factor: 1.0
  n_segments: 20
  gas_turbulence_intensity: 0.1
  coolant_turbulence_intensity: 0.05
  hot_gas_cp: 2200.0
film_cooling:
  enabled: false
  mass_fraction: 0.05
  injection_temperature: null
  effectiveness_ref: 0.45
  decay_length: 0.05
  apply_to_fraction_of_length: 0.6
  slot_height: 0.00035
  reference_blowing_ratio: 0.6
  blowing_exponent: 0.62
  turbulence_reference_intensity: 0.08
  turbulence_sensitivity: 1.0
  turbulence_exponent: 1.0
  turbulence_min_multiplier: 0.5
  reference_wall_temperature: 1100.0
  density_override: null
  cp_override: null
ablative_cooling:
  enabled: true  # ENABLE for 3D CEA cache testing!
  material_density: 1600.0  # kg/m³ - Phenolic ablator typical
  heat_of_ablation: 2.5e6  # J/kg - Effective heat of ablation
  thermal_conductivity: 0.35  # W/(m·K)
  specific_heat: 1500.0  # J/(kg·K)
  initial_thickness: 0.008  # m - 8mm ablative liner (realistic for 10s burn)
  surface_temperature_limit: 1200.0  # K
  coverage_fraction: 0.9  # 90% of chamber surface protected
  pyrolysis_temperature: 950.0  # K - Characteristic pyrolysis temp
  # Blowing effect (pyrolysis gas protection)
  use_physics_based_blowing: true  # If true, computes B = m_dot_pyrolysis/m_dot_external
  blowing_coefficient: 0.5  # Coefficient c in f(B) = 1/(1 + c*B). Typical range: 0.3-0.8
  blowing_min_reduction_factor: 0.1  # Minimum fraction of convective heat that remains (max reduction = 1 - this). Default 0.1 = max 90% reduction
  blowing_efficiency: 0.75  # Legacy constant factor (used if use_physics_based_blowing=false)
  # Radiative heat transfer
  surface_emissivity: 0.85  # Emissivity for radiative heat transfer (0-1, typical 0.8-0.9 for charred ablators)
  ambient_temperature: 300.0  # K - Ambient/surrounding temperature for radiative heat transfer
  radiative_sink_minimum_threshold: 400.0  # K - If ambient_temperature is below this, uses fallback temperature
  radiative_sink_fallback_temperature: 600.0  # K - Fallback temperature when ambient is too low (represents heated steel layer)
  # Turbulence effects
  turbulence_reference_intensity: 0.08
  turbulence_sensitivity: 1.5
  turbulence_exponent: 1.0
  turbulence_max_multiplier: 3.0
  # Geometry evolution parameters
  throat_recession_multiplier: null  # null = calculate from physics (Bartz correlation)
                                     # or specify 1.2-2.0 for fixed multiplier
  char_layer_conductivity: 0.2  # W/(m·K) - Protective char layer
  char_layer_thickness: 0.001  # m - 1mm char layer
  track_geometry_evolution: true  # Enable time-varying L* tracking
  nozzle_ablative: false  # Chamber ablator only (graphite insert is separate)

# Graphite Throat Insert (separate from chamber ablator)
# Graphite inserts prevent burn-through in nozzle throat/exit
graphite_insert:
  enabled: true
  material_density: 2260.0  # kg/m³ - Graphite density
  heat_of_ablation: 1.5e7  # J/kg - High heat of ablation
  thermal_conductivity: 100.0  # W/(m·K) - High thermal conductivity
  specific_heat: 710.0  # J/(kg·K)
  activation_energy: 1.9e5  # J/mol
  initial_thickness: 0.006  # m - 6mm graphite insert (realistic for throat)
  surface_temperature_limit: 2500.0  # K - Graphite can handle high temps
  oxidation_temperature: 800.0  # K
  oxidation_rate: 1.0e-06  # https://info.ornl.gov/sites/publications/Files/Pub172937.pdf
  oxidation_reference_temperature: 973  # https://info.ornl.gov/sites/publications/Files/Pub172937.pdf
  oxidation_reference_pressure: 21000  # https://info.ornl.gov/sites/publications/Files/Pub172937.pdf
  recession_multiplier: null  # Use physics-based calculation
  char_layer_conductivity: 5.0  # W/(m·K)
  char_layer_thickness: 0.0005  # m - 0.5mm char layer
  coverage_fraction: 1.0  # 100% coverage at throat
  axial_half_length: 0.02  # 20mm half-length (40mm total, realistic)
discharge:
  oxidizer:
    Cd_inf: 0.4
    a_Re: 0.15
    Cd_min: 0.15
    use_pressure_correction: false
    P_ref: 5000000.0
    a_P: 0.0
    use_temperature_correction: false
    T_ref: 90.0
    a_T: 0.0
  fuel:
    Cd_inf: 0.65
    a_Re: 0.2
    Cd_min: 0.2
    use_pressure_correction: false
    P_ref: 5000000.0
    a_P: 0.0
    use_temperature_correction: false
    T_ref: 300.0
    a_T: 0.0
spray:
