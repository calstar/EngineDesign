    use_parallel_cea_build: true
    cea_parallel_workers: null
    ox_name: LOX
    fuel_name: RP-1
    expansion_ratio: 10.0953
    cache_file: cea_cache_LOX_RP1_3D.npz
    Pc_range:
    - 1000000.0
    - 9000000.0
    MR_range:
    - 1.6
    - 3.5
    eps_range:
    - 4.0
    - 15.0
    n_points: 34
  efficiency:
    model: exponential
    C: 0.3
    K: 0.15
    use_spray_correction: false
    spray_penalty_factor: 0.8
    use_mixture_coupling: true
    use_cooling_coupling: true
    use_turbulence_coupling: true
    mixture_efficiency_floor: 0.25
    cooling_efficiency_floor: 0.25
    turbulence_efficiency_floor: 0.3
    target_turbulence_intensity: 0.08
    turbulence_penalty_exponent: 1.0
    target_smd_microns: 50.0
    xstar_limit_mm: 50.0
    xstar_penalty_exponent: 2.0
    we_reference: 100.0
    we_penalty_exponent: 0.5
    smd_penalty_exponent: 1.0
    use_advanced_model: True
    use_finite_rate_chemistry: true
    use_shifting_equilibrium: true
chamber:
  volume: 0.0035  # ~3.5L chamber volume (realistic for ~7kN engine)
  A_throat: 0.000857892  # ~33mm throat diameter (realistic)
  length: 0.25  # 25cm chamber length (realistic)
  Lstar: 1.2  # 1.2m L* (typical for pintle, good combustion)
