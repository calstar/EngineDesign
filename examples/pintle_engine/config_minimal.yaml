  spray_angle:
    model: TMR
    k: 0.5
    n: 0.5
  weber:
    We_min: 15.0
  smd:
    model: lefebvre
    C: 0.5
    m: 0.6
    p: 0.0
  evaporation:
    K: 300000.0
    x_star_limit: 0.05
    use_constraint: true
  use_turbulence_corrections: false
  turbulence_breakup_gain: 1.0
  turbulence_penetration_gain: 0.5
combustion:
