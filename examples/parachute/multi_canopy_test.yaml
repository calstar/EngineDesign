atmosphere:
  rho: 1.225
  g: 9.80665
  v_air: [0, 0, 0]

bodies:
  rocket:
    m: 55
    I_body:
      - [5, 0, 0]
      - [0, 5, 0]
      - [0, 0, 5]
    r0: [0, 0, 0]
    v0: [0, 0, -30]  # m/s downward
    q0: [1, 0, 0, 0]
    w0: [0, 0, 0]
    anchors_B:
      base: [0, 0, 0]
    # Configure separation: when leg_drogue goes taut, body splits
    separate_on_pickup: leg_drogue
    separation_v_mag: 2.0  # m/s separation velocity
    separation_w_mag: 5.0  # rad/s spin

canopies:
  # Drogue: deploys at t=0, positioned to create separation
  drogue:
    A_inf: 2.0
    CD_inf: 1.6
    td: 0.0  # Deploy immediately
    tau_A: 0.4
    tau_CD: 0.4
    m_canopy: 0.3
    Ca: 1.0
    kappa: 4.0
    # Start slack - will separate when body splits
    p0: [0, 0, 2.8]  # Just under L0=3.0m
    v0: [0, 0, -28]  # Slightly slower to create separation
    
  # Pilot: deploys at t=2s, connected to drogue
  pilot:
    A_inf: 4.0
    CD_inf: 1.5
    td: 2.0  # Deploy at t=2s
    tau_A: 0.6
    tau_CD: 0.6
    m_canopy: 0.4
    Ca: 1.0
    kappa: 4.0
    p0: [0, 0, 5.8]  # Connected to drogue at z=2.8, L0=3.0
    v0: [0, 0, -28]
    
  # Main: deploys at t=4s, connected to pilot
  main:
    A_inf: 16.0
    CD_inf: 1.4
    td: 4.0  # Deploy at t=4s
    tau_A: 0.8
    tau_CD: 0.8
    m_canopy: 1.0
    Ca: 1.0
    kappa: 4.0
    p0: [0, 0, 8.5]  # Connected to pilot at z=5.8, L0=4.0
    v0: [0, 0, -28]

edges:
  # Realistic Kevlar properties
  - id: leg_drogue
    n_minus: "rocket:base"
    n_plus: drogue
    L0: 3.0
    k0: 20000
    k1: 0
    alpha: 1
    c: 200
    T_pre: 0
    T_max: 3000
    
  - id: leg_pilot
    n_minus: drogue
    n_plus: pilot
    L0: 3.0
    k0: 20000
    k1: 0
    alpha: 1
    c: 200
    T_pre: 0
    T_max: 3000
    
  - id: riser_main
    n_minus: pilot
    n_plus: main
    L0: 4.0
    k0: 20000
    k1: 0
    alpha: 1
    c: 200
    T_pre: 0
    T_max: 3000

