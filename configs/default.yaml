    Cd_inf: 0.4
    a_Re: 0.15
    Cd_min: 0.15
    use_pressure_correction: false
    P_ref: 5000000.0
    a_P: 0.0
    use_temperature_correction: false
    T_ref: 90.0
    a_T: 0.0
  fuel:
    Cd_inf: 0.65
    a_Re: 0.2
    Cd_min: 0.2
    use_pressure_correction: false
    P_ref: 5000000.0
    a_P: 0.0
    use_temperature_correction: false
    T_ref: 300.0
    a_T: 0.0
spray:
  momentum_flux_ratio: true
  spray_angle:
    model: TMR
    k: 0.5
    n: 0.5
  weber:
    We_min: 15.0
  smd:
    model: lefebvre
    C: 0.5
    m: 0.6
    p: 0.0
  pintle:
    C: 15.0
    B: 2.0
    n: 0.5
    p: 0.2
  evaporation:
    K: 300000.0
    x_star_limit: 0.05
    use_constraint: true
  use_turbulence_corrections: false
  turbulence_breakup_gain: 1.0
  turbulence_penetration_gain: 0.5
combustion:
  cea:
    use_parallel_cea_build: true
    cea_parallel_workers: null
    ox_name: LOX
    fuel_name: RP-1
    expansion_ratio: 7.8169
    cache_file: output/cache/cea_cache_LOX_RP1_3D.npz
    Pc_range:
    - 1000000.0
    - 9000000.0
    MR_range:
    - 1.6
    - 3.5
    eps_range:
    - 4.0
    - 15.0
    n_points: 34
  efficiency:
    # === PHYSICS-BASED EFFICIENCY MODEL ===
    # Efficiency calculated from: eta_cstar = eta_Lstar × eta_kinetics × eta_mixing × cooling_eff
    # - eta_Lstar: Evaporation/gasification efficiency (uses actual SMD, residence time)
    # - eta_kinetics: Reaction completion (Damköhler number from actual P/T)
    # - eta_mixing: Turbulent mixing (actual velocities, turbulence intensity)
    # - cooling_eff: Heat removal effects (from cooling models)
    
    model: exponential
    C: 0.3
    K: 0.15
    use_spray_correction: false
    spray_penalty_factor: 0.8
    
    # Diagnostics and coupling
    use_mixture_coupling: false         # Diagnostics-only (does not affect efficiency)
    use_cooling_coupling: true          # Apply cooling efficiency corrections
    cooling_efficiency_floor: 0.25      # Minimum cooling efficiency
    
    # Advanced physics models
    use_advanced_model: true
    use_finite_rate_chemistry: true
    use_shifting_equilibrium: true
    T_star_fuel_cap_K: 1000.0  # Effective fuel interface temperature cap for gasification [K]
# =============================================================================
# CHAMBER GEOMETRY - All inputs for solve_chamber_geometry_with_cea
# =============================================================================
chamber_geometry:
  # Design requirements
  design_pressure: 2413166.0      # Pc [Pa] - 350 psi design point (300–400 psi range)
  design_thrust: 7000.0           # F [N] - target thrust
  design_MR: 2.55                 # O/F mixture ratio at design point
  
  # Chamber dimensions
  chamber_diameter: 0.12065       # Inner chamber diameter [m]
  Lstar: 1.11                     # Characteristic length [m] (0.95-1.27 for LOX/RP-1)
  
  # Nozzle dimensions
  exit_diameter: 0.1305           # Nozzle exit diameter [m] - UPDATED to match eps*At
  expansion_ratio: 7.818022         # Area ratio (A_exit / A_throat)
  nozzle_efficiency: 0.95         # Nozzle efficiency (0.94-0.98 typical)
  
  # Solver outputs (computed by solve_chamber_geometry_with_cea)
  A_throat: 0.001709              # Throat area [m²] - UPDATED (7 kN @ 350 psi, Cf=1.7)
  A_exit: 0.013361                # Exit area [m²] - UPDATED (= eps * At)
  volume: 0.001897                # Chamber volume [m³] - UPDATED (= L* * At)
  length: 0.1661                  # Total chamber length [m] - UPDATED (= volume / Ac with Dc=0.12065 m)
  length_cylindrical: 0.121       # Cylindrical section length [m]
  length_contraction: 0.0451      # Contraction section length [m]
  Cf: 1.70                        # UPDATED design-point Cf

solver:
  method: brentq
  Pc_bounds:
  - 100000.0
  - 8000000.0
  tolerance: 1.0e-06
  max_iterations: 100
  closure:
    max_iterations: 6
    Cd_reduction_factor: 0.95
    tolerance: 0.0001
# Tank configurations - 'mass' is the PROPELLANT mass (initial liquid fill)
