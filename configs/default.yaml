  lox_radius: 0.06985
  ox_tank_pos: 0.8
  mass: 18.0  # LOX propellant mass [kg] (not tank structure mass)
fuel_tank:
  rp1_h: 0.609
  rp1_radius: 0.0762
  fuel_tank_pos: 3
  mass: 7.0  # RP-1 propellant mass [kg] (not tank structure mass)
press_tank:
  press_h: 0.457
  press_radius: 0.0762
  pres_tank_pos: 3.6
  mass: null
  free_volume_L: 4.5  # COPV free internal volume [L]
# Rocket configuration - NEW MASS MODEL
# =====================================
# Coordinate system: z=0 at rocket tail, positive toward nose
#                    For motor: z=0 at nozzle exit, positive toward chamber
#
# MASS BREAKDOWN:
#   airframe_mass:       Fuselage, fins, nosecone, avionics, payload (NO propulsion)
#   propulsion_dry_mass: Engine + tank structures + plumbing (your CAD propulsion assembly)
#   lox_tank.mass:       LOX propellant only (not tank structure)
#   fuel_tank.mass:      RP-1 propellant only (not tank structure)
#
# EXAMPLE:
#   Total dry mass = 78.72 + 24.0 = 102.72 kg
#   Total wet mass = 102.72 + 22.0 + 4.0 = 128.72 kg
#
rocket:
  # NEW mass model - matches CAD assemblies
  airframe_mass: 78.72      # Airframe only (fuselage, fins, nosecone, avionics) [kg]
  cm_wo_motor: 3.861725449  # Airframe center of mass without motor, from tail [m]
  
  # Propulsion breakdown (for accurate CM calculation)
  engine_mass: 8.0                 # Engine + plumbing [kg]
  lox_tank_structure_mass: 5.0     # Empty LOX tank [kg]
  fuel_tank_structure_mass: 3.0    # Empty fuel tank [kg]
  copv_dry_mass: 2.969             # Empty COPV tank [kg]
  engine_cm_offset: 0.15           # Engine CM above nozzle exit [m]
  
  # COMPUTED: propulsion_dry_mass = engine + lox_tank + fuel_tank + copv = 21.0 kg
  propulsion_dry_mass: 21.0 # Engine + tank structures + COPV [kg]
  propulsion_cm_offset: 0.4 # CM of propulsion system above nozzle exit [m]
  motor_position: 0.0      # Nozzle exit position from rocket tail [m]
  
  # Geometry
  radius: 0.078359          # Rocket body radius [m]
  rocket_length: 7.5        # Total rocket length (tail to nose) [m]
  
  # Inertia of AIRFRAME ONLY (no propulsion, no propellants) [kg·m²]
  # Propulsion inertia is auto-calculated from propulsion_dry_mass
  inertia:
  - 8.0   # Ixx (roll)
  - 8.0   # Iyy (pitch)
  - 0.5   # Izz (yaw)
  
  fins:
    no_fins: 4
    root_chord: 0.626872
    tip_chord: 0.20066
    fin_span: 0.20066
    fin_position: 1.054535
  strakes:
    no_fins: 4
    root_chord: 0.305
    tip_chord: 0.152
    fin_span: 0.152
    fin_position: 3.58
