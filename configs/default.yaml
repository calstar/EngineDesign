fluids:
  oxidizer:
    name: LOX
    density: 1140.0
    viscosity: 0.00018
    surface_tension: 0.013
    vapor_pressure: 101325.0
    specific_heat: 2300.0
    thermal_conductivity: 0.15
    temperature: 90.0
  fuel:
    name: RP-1
    density: 780.0
    viscosity: 0.002
    surface_tension: 0.025
    vapor_pressure: 1000.0
    specific_heat: 2000.0
    thermal_conductivity: 0.13
    temperature: 293.0
    # Properties for Spalding number (Bm) calculation in evaporation model
    boiling_point: 489.0          # T_boil [K] - RP-1 average boiling point
    latent_heat: 300000.0         # L_vap [J/kg] - latent heat of vaporization
    molecular_weight: 170.0       # M [g/mol] - average molecular weight for RP-1
    Pc_ref: 2500000.0             # Reference pressure [Pa] for stable Bm calculation
    # Antoine equation coefficients for vapor pressure: log10(P) = A - B/(C + T_K)
    # RP-1/kerosene approximation (similar to n-dodecane)
    A_antoine: 6.98               # Dimensionless
    B_antoine: 1501.0             # [K]
    C_antoine: -78.67             # [K]
injector:
  type: pintle
  geometry:
    lox:
      n_orifices: 12
      d_orifice: 0.003
      theta_orifice: 30.0
      A_entry: 8.0e-06
      d_hydraulic: 0.003
    fuel:
      d_pintle_tip: 0.015
      d_reservoir_inner: 0.016
      h_gap: 0.0005
      A_entry: 1.2e-05
      d_hydraulic: 0.001
